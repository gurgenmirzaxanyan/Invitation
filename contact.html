<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="index.css">

    <title>Հաստատել Մասնակցությունը</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
 body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .rsvp-card {
            background: #fff;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h2 {
            color: #764ba2;
            margin-bottom: 25px;
        }

        /* Ֆորմայի դաշտերը */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
       

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            font-family: 'Montserrat', sans-serif;
        }

        input:focus, select:focus {
            border-color: #764ba2;
        }

        /* Կոճակ */
        .submit-btn {
            width: 100%;
            background: #764ba2;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #5b378a;
            transform: translateY(-2px);
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
        }
  
    </style>
</head>
<body>

    <div class="rsvp-card">
        <h2>✅ Կգա՞ք ծնունդիս</h2>
        
        <form id="rsvpForm" onsubmit="sendToWhatsApp(event)">
            
            <div class="form-group">
                <label for="name">Ձեր Անունը</label>
                <input type="text" id="name" placeholder="Օրինակ՝ Արմեն" required>
            </div>

            <div class="form-group">
                <label for="count">Քանի՞ հոգով եք լինելու</label>
                <select id="count">
                    <option value="1">Մենակ ես (1 հոգի)</option>
                    <option value="2">2 հոգով</option>
                    <option value="3">3 հոգով</option>
                    <option value="4">4 հոգով</option>
                    <option value="Imus">Չեմ կարողանա գալ 😔</option>
                </select>
            </div>

            <button type="submit" class="submit-btn">Ուղարկել պատասխանը</button>
        </form>

        <a href="./index.html" class="back-link">← Վերադառնալ հրավերի էջ</a>
    </div>

    <script src="./index.js"></script>

</body>

</html>
